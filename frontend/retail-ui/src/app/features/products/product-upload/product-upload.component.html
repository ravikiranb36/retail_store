<div class="upload-container">
  <h2>Manage Products</h2>

  @if (!isStoreManager) {
    <div class="error">
        You do not have permission to manage products. Only Store Managers can perform this action.
    </div>
  } @else {
    <div class="upload-section">
        <h3>Upload CSV</h3>
        <div class="form-group">
            <label for="csvFile">Select CSV File:</label>
            <input type="file" id="csvFile" (change)="onFileSelected($event)" accept=".csv" [disabled]="isProcessing">
        </div>
        <button (click)="onUploadCSV()" [disabled]="!selectedFile || isProcessing">Upload</button>
    </div>

    <hr>

    <div class="create-section">
        <h3>Create Single Product</h3>
        <form [formGroup]="productForm" (ngSubmit)="onProductSubmit()">
            <div class="form-group">
                <label for="store_id">Store</label>
                <select id="store_id" formControlName="store_id">
                    <option value="">Select Store</option>
                    @for (store of stores; track store.id) {
                        <option [value]="store.id">{{ store.name }}</option>
                    }
                </select>
            </div>
            <div class="form-group">
                <label for="sku">SKU</label>
                <input id="sku" type="text" formControlName="sku" placeholder="SKU">
            </div>
            <div class="form-group">
                <label for="product_name">Product Name</label>
                <input id="product_name" type="text" formControlName="product_name" placeholder="Product Name">
            </div>
            <div class="form-group">
                <label for="price">Price</label>
                <input id="price" type="number" formControlName="price" placeholder="Price">
            </div>
            <div class="form-group">
                <label for="date">Date</label>
                <input id="date" type="date" formControlName="date">
            </div>
            <button type="submit" [disabled]="!productForm.valid || isProcessing">Create Product</button>
        </form>
    </div>
  }

  @if (uploadStatus) {
    <div class="status-message success">
        {{ uploadStatus }}
    </div>
  }

  @if (errorMessage) {
    <div class="status-message error">
        {{ errorMessage }}
    </div>
  }
</div>
